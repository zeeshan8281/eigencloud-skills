<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eigen-skills chat</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #09090f;
      --surface: #111118;
      --surface2: #1a1a25;
      --border: #252535;
      --text: #e8e8f0;
      --text2: #7878a0;
      --accent: #6c5ce7;
      --accent2: #a29bfe;
      --green: #00d68f;
      --red: #ff6b6b;
      --yellow: #ffd93d;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      font-size: 24px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent2), #4ecdc4);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      margin-left: auto;
    }

    header .dot.on {
      background: var(--green);
      box-shadow: 0 0 8px rgba(0, 214, 143, 0.5);
    }

    header .status-text {
      font-size: 12px;
      color: var(--text2);
    }

    /* Chat */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .chat::-webkit-scrollbar {
      width: 5px;
    }

    .chat::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 5px;
    }

    .msg {
      max-width: 720px;
      animation: fadeUp 0.2s ease;
    }

    .msg.user {
      align-self: flex-end;
    }

    .msg.bot {
      align-self: flex-start;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
      }
    }

    .msg .bubble {
      padding: 14px 18px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 14px;
    }

    .msg.user .bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg.bot .bubble.error {
      border-color: rgba(255, 107, 107, 0.3);
    }

    .msg.bot .bubble.thinking {
      color: var(--text2);
      font-style: italic;
    }

    /* Markdown-ish rendering */
    .bubble strong {
      color: var(--accent2);
      font-weight: 600;
    }

    .bubble code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 6px;
      border-radius: 4px;
      word-break: break-all;
    }

    .bubble pre {
      margin-top: 8px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      line-height: 1.5;
      max-height: 300px;
      overflow-y: auto;
    }

    .bubble a {
      color: var(--accent2);
      text-decoration: none;
    }

    .bubble a:hover {
      text-decoration: underline;
    }

    .elapsed {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
      padding-left: 4px;
    }

    /* Suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 24px 16px;
    }

    .sug {
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .sug:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface2);
    }

    /* Input */
    .input-row {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-row input:focus {
      border-color: var(--accent);
    }

    .input-row input::placeholder {
      color: var(--text2);
    }

    .input-row button {
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .input-row button:hover {
      background: #5a4bd1;
    }
  </style>
</head>

<body>

  <header>
    <span class="logo">⚡</span>
    <h1>eigen-skills</h1>
    <div class="dot" id="dot"></div>
    <span class="status-text" id="statusText">Connecting...</span>
  </header>

  <div class="chat" id="chat"></div>

  <div class="suggestions" id="suggestions">
    <button class="sug" onclick="send('what is the total TVL?')">What's the TVL?</button>
    <button class="sug" onclick="send('show me top 5 operators')">Top 5 operators</button>
    <button class="sug" onclick="send('top AVS by APY')">Best AVS yield</button>
    <button class="sug" onclick="send('most delegated operators')">Most delegated</button>
    <button class="sug" onclick="send('compute health check')">Compute health</button>
    <button class="sug" onclick="send('DA proxy status')">DA proxy status</button>
    <button class="sug" onclick="send('explorer URL for 0xabc123')">Explorer URL</button>
    <button class="sug" onclick="send('TEE attestation')">TEE attestation</button>
  </div>

  <div class="input-row">
    <input id="input" placeholder="Ask anything about EigenLayer..." autofocus />
    <button onclick="sendInput()">Send</button>
  </div>

  <script>
  const socket = io();
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');

  socket.on('connect', () => {
    document.getElementById('dot').classList.add('on');
    document.getElementById('statusText').textContent = 'Connected';
  });
  socket.on('disconnect', () => {
    document.getElementById('dot').classList.remove('on');
    document.getElementById('statusText').textContent = 'Disconnected';
  });

  socket.on('system', (data) => {
    if (!data.hasApiKey) {
      addBot('⚠️ **No API key found.** Set `EIGEN_API_KEY` in your `.env` file.\nGet one free at [developer.eigenexplorer.com](https://developer.eigenexplorer.com)', 'error');
    }
  });

  socket.on('reply', (data) => {
    if (data.type === 'thinking') {
      addBot(data.text, 'thinking');
      return;
    }
    // Remove last thinking message
    const msgs = chat.querySelectorAll('.msg.bot');
    const last = msgs[msgs.length - 1];
    if (last && last.querySelector('.thinking')) last.remove();

    addBot(data.text, data.type === 'error' ? 'error' : '', data.elapsed);
  });

  function send(text) {
    if (!text.trim()) return;
    addUser(text);
    socket.emit('chat', { text });
    // Hide suggestions after first use
    document.getElementById('suggestions').style.display = 'none';
  }

  function sendInput() {
    send(input.value);
    input.value = '';
    input.focus();
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendInput();
  });

  function addUser(text) {
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `<div class="bubble">${esc(text)}</div>`;
    chat.appendChild(el);
    scroll();
  }

  function addBot(text, cls, elapsed) {
    const el = document.createElement('div');
    el.className = 'msg bot';
    const html = renderMarkdown(text);
    el.innerHTML = `<div class="bubble ${cls || ''}">${html}</div>` +
      (elapsed ? `<div class="elapsed">${elapsed}ms</div>` : '');
    chat.appendChild(el);
    scroll();
  }

  function scroll() {
    requestAnimationFrame(() => chat.scrollTop = chat.scrollHeight);
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMarkdown(text) {
    // Basic markdown: **bold**, `code`, ```blocks```, links, newlines
    let html = esc(text);
    // Code blocks
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre>$2</pre>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    // URLs
    html = html.replace(/(https?:\/\/[^\s<]+)/g, (m) => {
      if (m.includes('href="')) return m;
      return `<a href="${m}" target="_blank">${m}</a>`;
    });
    // Newlines
    html = html.replace(/\n/g, '<br>');
    return html;
  }
  </script>
</body>

</html>
